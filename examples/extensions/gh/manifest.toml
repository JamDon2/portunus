api = 4
name = "gh"
version = "0.2.0"
description = "Live GitHub search - repos and issues, instant cache, streaming results"
author = "Portunus examples"
homepage = "https://github.com"
kinds = ["ext-gh"]

# Raycast-style multi-command manifest: each entry is its own searchable
# launcher command (found by title + keywords, entered as a scope); the wire
# `command` field tells the guest which one ran.
[[commands]]
name = "repos"
title = "Search Repositories"
description = "GitHub repositories"
mode = "scope"
keywords = ["gh", "github", "repos", "repositories"]
min_query_len = 2
chip = "Repos"
placeholder = "Search GitHub repositories…"

[[commands]]
name = "issues"
title = "Search Issues"
description = "GitHub issues and pull requests"
mode = "scope"
keywords = ["ghi", "github", "issues", "pulls", "pr"]
min_query_len = 2
chip = "Issues"
placeholder = "Search GitHub issues…"

[[commands]]
name = "notifications"
title = "Open GitHub Notifications"
description = "github.com/notifications in the browser"
mode = "action"

[permissions]
network = ["api.github.com"]
kv = true

[limits]
search_timeout_ms = 50        # kv-only fast path, no network
query_timeout_ms = 10000      # two API round-trips, off the keystroke path
preview_timeout_ms = 8000     # metadata then README, streamed
activate_timeout_ms = 3000

# Warm the "my repos" cache daily (also runs once at load).
[background]
refresh_interval_secs = 86400

[[settings]]
key = "token"
type = "secret"
label = "GitHub token (PAT)"
description = "Optional. Unlocks private repos and higher rate limits. Scopes: repo (or public_repo)."

[[settings]]
key = "max_per_endpoint"
type = "number"
label = "Results per endpoint"
default = 6
min = 1
max = 15
step = 1
